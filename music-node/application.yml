server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
  server:
    # Placeholder only — Compose sets LAVALINK_SERVER_PASSWORD from MUSIC_NODE_PASSWORD.
    password: "youshallnotpass"
    sources:
      # Built-in YouTube is deprecated; youtube-source plugin handles YouTube instead.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      nico: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # TV is the only OAuth-compatible client (needed when YOUTUBE_OAUTH_ENABLED=true).
    # ANDROID_VR currently streams reliably; TV covers OAuth/age-gated playback.
    clients:
      - MUSIC
      - ANDROID_VR
      - TV
      - WEB
      - WEBEMBEDDED
    oauth:
      enabled: ${YOUTUBE_OAUTH_ENABLED:false}
      refreshToken: "${YOUTUBE_OAUTH_REFRESH_TOKEN:}"
      skipInitialization: ${YOUTUBE_OAUTH_SKIP_INITIALIZATION:false}
    pot:
      token: "${YOUTUBE_PO_TOKEN:}"
      visitorData: "${YOUTUBE_VISITOR_DATA:}"

logging:
  level:
    root: INFO
    lavalink: INFO
